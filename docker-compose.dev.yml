# Sobe apenas PostgreSQL e Redis para desenvolvimento local
# Uso: docker-compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: neurodev_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: neurodev_fin
      POSTGRES_USER: neurodev
      POSTGRES_PASSWORD: neurodev2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurodev -d neurodev_fin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neurodev_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
